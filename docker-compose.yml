services:
  db:
    image: postgres:16
    container_name: postgres-db
    environment:
      POSTGRES_DB: mydb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    container_name: my-app
    depends_on:
      - db
    ports:
      - "8000:8000"

volumes:
  postgres_data: