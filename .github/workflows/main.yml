name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name: Show files
        run: ls -la

      - name: Build
        run: docker compose build

      - name: Start containers
        run: docker compose up -d

      - name: Remove dangling images
        run: docker image prune -f