{% extends 'account_template.html' %}


{% load static %}

{% block content_left %}
  <div class="h-[150px] w-[300px] p-5  ">

    <img class="rounded-xl" src="{{ user.student.profile_pic.url }}" alt="" />

    <label class="block text-lg font-medium text-gray-700 mb-1 p-6">Name: {{ user.student.name }}</label>
  </div>

{% endblock %}


{% block content %}
  <div class="w-full max-w-sm">
    <!-- Logo -->
    <div class="text-3xl mb-6">🔵</div>

    <!-- Heading -->
    <h2 class="text-2xl font-semibold mb-1">Update Profile</h2>
    <p class="text-sm text-gray-500 mb-6">Please enter your details.</p>

    <!-- Form -->
    <form method="POST" class="space-y-4" enctype="multipart/form-data">
      {% csrf_token %}
      <div>
          <label for="{{ form.name.id_for_label }}" class="block text-sm font-medium text-gray-700 mb-1">
            {{ form.name.label }}
          </label>
          {{ form.name }}
        </div>
      
      <div>
          <label for="{{ form.email.id_for_label }}" class="block text-sm font-medium text-gray-700 mb-1">
          {{ form.email.label }}
          </label>
          {{ form.email }}
      </div>

      {{ form.profile_pic }}
              


      <button type="submit" class="w-full bg-[#9FB3DF] text-white py-2 rounded-md hover:bg-[#4E1F00] transition">Save</button>
    </form>




  </div>

{% endblock %}
